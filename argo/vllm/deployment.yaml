apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        gpu: "true"
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.17.0
        args:
        - "--model"
        - "openai/gpt-oss-20b"
        - "--max-model-len"
        - "32768"
        - "--gpu-memory-utilization"
        - "0.95"
        - "--quantization"
        - "fp8"
        - "--api-key-file"
        - "/secrets/api-key"
        env:
        - name: VLLM_WORKER_MULTIPROC_METHOD
          value: "spawn"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: 32Gi
          requests:
            nvidia.com/gpu: 1
            cpu: "2"
            memory: 16Gi
        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: api-key
          mountPath: /secrets
          readOnly: true
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 120
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 30
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache
      - name: api-key
        secret:
          secretName: vllm-api-key
