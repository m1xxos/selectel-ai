apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: vllm-gateway
  namespace: vllm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: traefik
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: gpt.m1xxos.tech
    tls:
      mode: Terminate
      certificateRefs:
      - name: gpt-m1xxos-tech-tls
        kind: Secret
    allowedRoutes:
      namespaces:
        from: Same
  - name: http
    protocol: HTTP
    port: 80
    hostname: gpt.m1xxos.tech
    allowedRoutes:
      namespaces:
        from: Same
